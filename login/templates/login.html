<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nur Al-Huda - Login</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter as primary -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
  <!-- Loading Spinner (hidden by default) -->
  <div id="loading" class="hidden fixed inset-0 bg-white bg-opacity-75 z-50 flex items-center justify-center">
    <div class="spinner border-4 border-blue-500 border-t-transparent rounded-full w-12 h-12 animate-spin"></div>
  </div>

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="container mx-auto px-4">
      <div class="flex justify-between items-center py-4">
        <div class="flex items-center space-x-2">
          <span class="text-2xl font-bold text-blue-600">Nur Al-Huda</span>
        </div>
        <div class="hidden md:flex space-x-6">
          <a href="/" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
          <a href="/#about" class="text-gray-700 hover:text-blue-600 font-medium">About</a>
          <a href="/#features" class="text-gray-700 hover:text-blue-600 font-medium">Features</a>
          <a href="/#contact" class="text-gray-700 hover:text-blue-600 font-medium">Contact</a>
        </div>
        <div class="flex items-center space-x-3">
          <a href="/login" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg font-medium transition">Login</a>
          <button class="md:hidden focus:outline-none" id="menu-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
      </div>
      <!-- Mobile menu -->
      <div class="hidden md:hidden" id="mobile-menu">
        <a href="/" class="block py-2 text-gray-700 hover:text-blue-600">Home</a>
        <a href="/#about" class="block py-2 text-gray-700 hover:text-blue-600">About</a>
        <a href="/#features" class="block py-2 text-gray-700 hover:text-blue-600">Features</a>
        <a href="/#contact" class="block py-2 text-gray-700 hover:text-blue-600">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow container mx-auto px-4 py-12 flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
      <!-- Header with back button and image -->
      <div class="relative">
        <a href="/" onclick="loading_animation();" class="absolute top-4 left-4 z-10 cursor-pointer bg-white rounded-full p-1 shadow-md hover:bg-gray-100 transition">
          <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
        </a>
        <img src="{{ url_for('static', filename='img/nur.jpg') }}" alt="Background" class="w-full h-40 object-cover">
      </div>

      <!-- Main Content -->
      <div class="p-8 text-center">
        <!-- LOGIN letters -->
        <div class="flex justify-center space-x-2 mb-6">
          <span class="inline-block w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 text-white text-3xl font-bold rounded-full flex items-center justify-center shadow-md">L</span>
          <span class="inline-block w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 text-white text-3xl font-bold rounded-full flex items-center justify-center shadow-md">O</span>
          <span class="inline-block w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 text-white text-3xl font-bold rounded-full flex items-center justify-center shadow-md">G</span>
          <span class="inline-block w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 text-white text-3xl font-bold rounded-full flex items-center justify-center shadow-md">I</span>
          <span class="inline-block w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 text-white text-3xl font-bold rounded-full flex items-center justify-center shadow-md">N</span>
        </div>

        <form action="/login" method="post" class="space-y-5">
          <div class="text-left">
            <label class="block text-gray-700 mb-1 text-sm font-medium">Username</label>
            <input name="username" type="text" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
          </div>
          <div class="text-left">
            <label class="block text-gray-700 mb-1 text-sm font-medium">Password</label>
            <input name="password" type="password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
          </div>
          <div class="text-center pt-2">
            <input type="submit" value="Login" onclick="loading_animation()"
                   class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg cursor-pointer transition duration-200 shadow-md">
          </div>
        </form>

        <p class="text-sm text-gray-500 mt-6">
          <a href="#" class="text-blue-500 hover:underline">Forgot password?</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-6">
    <div class="container mx-auto px-4 text-center">
      <p class="text-gray-300 text-sm">&copy; 2026 Nur Al-Huda. All rights reserved.</p>
      <div class="flex justify-center space-x-4 mt-3">
        <a href="#" class="text-gray-400 hover:text-white transition text-sm">Privacy Policy</a>
        <a href="#" class="text-gray-400 hover:text-white transition text-sm">Terms of Service</a>
      </div>
    </div>
  </footer>

  <!-- Mobile menu toggle script -->
  <script>
    document.getElementById('menu-btn')?.addEventListener('click', function() {
      var menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    });
  </script>

  <!-- JavaScript for loading animation -->
  <script src="{{ url_for('static', filename='js/action.js') }}"></script>
</body>
</html>
