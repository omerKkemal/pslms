<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 - Internal Server Error | Nur Al-Huda</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter as primary -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
  <!-- Minimal Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="container mx-auto px-4">
      <div class="flex justify-between items-center py-4">
        <div class="flex items-center space-x-2">
          <span class="text-2xl font-bold text-blue-600">Nur Al-Huda</span>
        </div>
        <div>
          <a href="/" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Error Content -->
  <main class="flex-grow container mx-auto px-4 py-16 flex items-center justify-center">
    <div class="max-w-2xl w-full text-center">
      <!-- Error Illustration (optional) -->
      <div class="mb-8 flex justify-center">
        <div class="w-32 h-32 bg-red-100 rounded-full flex items-center justify-center">
          <svg class="w-16 h-16 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
      </div>

      <h1 class="text-6xl font-bold text-gray-800 mb-4">500</h1>
      <h2 class="text-3xl font-semibold text-gray-700 mb-4">Internal Server Error</h2>
      <p class="text-lg text-gray-600 mb-8 max-w-md mx-auto">
        Oops! Something went wrong on our end. We're working to fix it. Please try again later.
      </p>

      <div class="flex flex-col sm:flex-row justify-center gap-4">
        <a href="/" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-8 rounded-lg transition text-lg">
          Go Back Home
        </a>
        <button onclick="window.location.reload();" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-8 rounded-lg transition text-lg">
          Try Again
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-6">
    <div class="container mx-auto px-4 text-center">
      <p class="text-gray-300 text-sm">&copy; 2026 Nur Al-Huda. All rights reserved.</p>
    </div>
  </footer>

  <!-- JavaScript (optional, for any future enhancements) -->
  <script src="{{ url_for('static', filename='js/action.js') }}"></script>
</body>
</html>
