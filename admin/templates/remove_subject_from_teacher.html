{% extends "base.html" %}

{% block title %}Admin UI - Remove Subject{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
  <!-- Back button -->
  <div class="relative">
    <a onclick="loading_back();" class="absolute top-4 left-4 z-10 cursor-pointer">
      <img src="{{ url_for('static', filename='img/back.svg') }}" alt="Back" class="w-10">
    </a>
    <div class="w-full h-40 bg-gray-200"></div>
  </div>

  <div class="p-6">
    <form action="/admin/panal/remove_subject_from_teacher/{{ ID }}" onsubmit="loading_animation();" method="post" class="space-y-6">
      {% for key,value in by_section.items() %}
        <div class="border border-gray-200 rounded-lg p-4">
          <h3 class="text-xl font-semibold mb-3">{{ key }}</h3>
          <div class="space-y-3">
            {% for i,val in enumerate(value) %}
              <div class="flex items-center space-x-3">
                <p class="flex-1">{{ val[1] }} : {{ val[2] }}</p>
                <select name="{{ val[0] }}" class="px-3 py-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
                  {% for acc in access %}
                    <option value="{{ val[0] }}-{{ acc }}">{{ acc }}</option>
                  {% endfor %}
                </select>
              </div>
            {% endfor %}
          </div>
        </div>
      {% endfor %}
      <div class="text-center">
        <input type="submit" value="Save" class="bg-green-400 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-lg cursor-pointer transition duration-200">
      </div>
    </form>
  </div>
</div>
{% endblock %}
