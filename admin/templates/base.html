<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin UI{% endblock %}</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter as primary, Edu as backup -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Edu+AU+VIC+WA+NT+Pre:wght@400..700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { font-family: 'Inter', 'Edu AU VIC WA NT Pre', sans-serif; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="container mx-auto px-4">
      <div class="flex justify-between items-center py-3">
        <div class="flex items-center space-x-4">
          <a href="/admin/panal" onclick="loading_animation();">
            <img src="{{ url_for('static', filename='img/logo.avif') }}" alt="Logo" class="h-10">
          </a>
          <div class="hidden md:flex space-x-1">
            <a href="/admin/Dashboard" onclick="loading_animation();" 
               class="px-3 py-2 rounded-md text-sm font-medium transition {{ 'bg-blue-50 text-blue-700' if active_page == 'dashboard' else 'text-gray-700 hover:bg-gray-100' }}">
              Dashboard
            </a>
            <a href="/admin/panal" onclick="loading_animation();" 
               class="px-3 py-2 rounded-md text-sm font-medium transition {{ 'bg-blue-50 text-blue-700' if active_page == 'admin_panal' else 'text-gray-700 hover:bg-gray-100' }}">
              Admin Panel
            </a>
            <a href="/admin/panal/section_info" onclick="loading_animation();" 
               class="px-3 py-2 rounded-md text-sm font-medium transition {{ 'bg-blue-50 text-blue-700' if active_page == 'section_info' else 'text-gray-700 hover:bg-gray-100' }}">
              View Students
            </a>
            <a href="/admin/panal/get_teachers" onclick="loading_animation();" 
               class="px-3 py-2 rounded-md text-sm font-medium transition {{ 'bg-blue-50 text-blue-700' if active_page == 'get_teachers' else 'text-gray-700 hover:bg-gray-100' }}">
              View Teachers
            </a>
            <a href="/view_resource" onclick="loading_animation();" 
               class="px-3 py-2 rounded-md text-sm font-medium transition {{ 'bg-blue-50 text-blue-700' if active_page == 'view_resource' else 'text-gray-700 hover:bg-gray-100' }}">
              View Resources
            </a>
          </div>
        </div>
        <div class="flex items-center space-x-2">
          <a href="/logout" onclick="loading_animation();" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-sm">Logout</a>
          <button class="md:hidden focus:outline-none" id="menu-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
      </div>
      <!-- Mobile menu -->
      <div class="hidden md:hidden" id="mobile-menu">
        <a href="/admin/Dashboard" onclick="loading_animation();" class="block py-2 text-gray-700 hover:text-green-600">Dashboard</a>
        <a href="/admin/panal" onclick="loading_animation();" class="block py-2 text-gray-700 hover:text-green-600">Admin Panel</a>
        <a href="/admin/panal/section_info" onclick="loading_animation();" class="block py-2 text-gray-700 hover:text-green-600">View Students</a>
        <a href="/admin/panal/get_teachers" onclick="loading_animation();" class="block py-2 text-gray-700 hover:text-green-600">View Teachers</a>
        <a href="/view_resource" onclick="loading_animation();" class="block py-2 text-gray-700 hover:text-green-600">View Resources</a>
      </div>
    </div>
  </nav>

  <!-- Loading Spinner (hidden by default) -->
  <div id="loading" class="hidden fixed inset-0 bg-white bg-opacity-75 z-50 flex items-center justify-center">
    <div class="spinner border-4 border-blue-500 border-t-transparent rounded-full w-12 h-12 animate-spin"></div>
  </div>

  <!-- Note Popup (hidden by default) -->
  <div id="note" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white border-l-4 border-green-500 rounded-lg p-4 shadow-lg z-50 w-11/12 max-w-sm">
    <span onclick="this.parentElement.style.display='none'" class="absolute top-1 right-2 text-2xl cursor-pointer">&times;</span>
    <h3 id="title" class="font-bold text-lg text-gray-800"></h3>
    <p id="subject" class="text-sm text-gray-600">.</p>
  </div>

  <!-- Main Content Block -->
  <main class="flex-grow container mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 py-4">
    <div class="container mx-auto text-center text-gray-600 text-sm">
      <p>&copy; 2026 Your School Name. All rights reserved.</p>
    </div>
  </footer>

  <!-- Mobile menu toggle script -->
  <script>
    document.getElementById('menu-btn')?.addEventListener('click', function() {
      var menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    });
  </script>

  <!-- Common JavaScript files -->
  <script src="{{ url_for('static', filename='js/action.js') }}"></script>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
