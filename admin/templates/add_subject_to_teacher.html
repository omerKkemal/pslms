{% extends "base.html" %}

{% block title %}Admin UI - Add Subject to Teacher{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden relative">
  <!-- Back button -->
  <div class="relative">
    <a onclick="loading_back();" class="absolute top-4 left-4 z-10 cursor-pointer">
      <img src="{{ url_for('static', filename='img/back.svg') }}" alt="Back" class="w-10">
    </a>
    <div class="w-full h-40 bg-gray-200 rounded-t-2xl"></div>
  </div>

  <div class="p-6">
    <h1 class="text-2xl font-bold text-center mb-6">Add subject to {{ teacher[0][1] }} {{ teacher[0][2] }}</h1>
    <form action="/admin/panal/add_subject_to_teacher/{{ teacher[0][0] }}" onsubmit="loading_animation();" method="post" class="space-y-4">
      <div class="space-y-3">
        <select name="grade" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">Grades</option>
          {% for grade in grades %}
            <option value="{{ grade }}">{{ grade }}</option>
          {% endfor %}
        </select>
        <select name="subject" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">Subjects</option>
          {% for subject in subjects %}
            <option value="{{ subject[0] }}">{{ subject[1] }}</option>
          {% endfor %}
        </select>
        <select name="sections" required multiple class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 h-32">
          {% for section in sections %}
            <option value="{{ section }}">{{ section }}</option>
          {% endfor %}
        </select>
        <p class="text-sm text-gray-500">Hold Ctrl (or Cmd) to select multiple sections.</p>
      </div>
      <div class="text-center">
        <input type="submit" value="Add" class="bg-green-400 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-lg cursor-pointer transition duration-200">
      </div>
    </form>
  </div>
</div>
{% endblock %}
