{% extends "base.html" %}

{% block title %}Admin UI - Edit Teacher Info{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden relative">
  <!-- Back button -->
  <div class="relative">
    <a onclick="loading_back();" class="absolute top-4 left-4 z-10 cursor-pointer">
      <img src="{{ url_for('static', filename='img/back.svg') }}" alt="Back" class="w-10">
    </a>
    <div class="w-full h-40 bg-gray-200 rounded-t-2xl"></div>
  </div>

  <div class="p-6">
    <h1 class="text-2xl font-bold text-center mb-6">Update {{ teacher[0][1] }} {{ teacher[0][2] }} info</h1>
    <form action="/admin/panal/edit_teacher_info/{{ teacher[0][0] }}" method="post" class="space-y-4">
      <div>
        <input name="fname" value="{{ teacher[0][1] }}" type="text" placeholder="First Name" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>
      <div>
        <input name="mname" value="{{ teacher[0][2] }}" type="text" placeholder="Middle Name" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>
      <div>
        <input name="lname" type="text" value="{{ teacher[0][3] }}" placeholder="Last Name" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>
      <div>
        <select name="gender" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="{{ teacher[0][4] }}">Gender</option>
          <option value="{{ gender['male'] }}">Male</option>
          <option value="{{ gender['female'] }}">Female</option>
        </select>
      </div>
      <div class="text-center">
        <input type="submit" value="Update" onclick="loading_animation();"
               class="bg-green-400 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-lg cursor-pointer transition duration-200">
      </div>
    </form>
  </div>
</div>
{% endblock %}
